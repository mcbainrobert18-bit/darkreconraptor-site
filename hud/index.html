<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal World — ReconRaptor LAB</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#050508;color:#e0e0e0;font-family:Orbitron,sans-serif}
header{padding:1rem 2rem;border-bottom:1px solid #1e1e2e;display:flex;justify-content:space-between;align-items:center}
h1{font-size:1rem;color:#00f7ff;letter-spacing:4px}
.mode-btn{background:#111;border:1px solid #333;color:#888;padding:.5rem 1rem;cursor:pointer;font-family:inherit}
.mode-btn.active{border-color:#ffd700;color:#ffd700}
#spectrum-canvas{width:100%;height:200px;display:block}
.panel{padding:1.5rem 2rem}
.warn{color:#ffaa00;font-size:.7rem;margin-top:1rem}
</style>
</head>
<body>
<header>
  <h1>SIGNAL WORLD</h1>
  <div>
    <button class="mode-btn active" data-mode="grind" onclick="setMode('grind')">GRIND $$$</button>
    <button class="mode-btn" data-mode="gaming" onclick="setMode('gaming')">GAMING FACE</button>
  </div>
</header>
<canvas id="spectrum-canvas"></canvas>
<div class="panel">
  <p id="mood-label">GRIND MODE</p>
  <div id="grind-panel">
    <p style="color:#666;font-size:.8rem">Lab spectrum demo — authorized RF research overlay for content creation.</p>
  </div>
  <p class="warn">Educational / authorized lab only. Demo data — connect your lab API in GODTIER build.</p>
  <a href="dashboard.html" style="color:#ff0033;font-size:.7rem">← RR LAB Dashboard</a>
</div>
<script src="signal_overlay.js"></script>
<script>
// Demo spectrum when no API
function demoTick() {
  const data = { spectrum: Array.from({length:64}, () => -90 + Math.random()*40) };
  if (typeof drawSpectrum === 'function') drawSpectrum(data);
}
setInterval(demoTick, 200);
demoTick();
</script>
</body>
</html>
