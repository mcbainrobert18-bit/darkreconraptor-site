# DARKRECONRAPTOR.COM — Njalla DNS → YOUR_SERVER_IP
# Static site + optional app proxies for hud / beast / operator

upstream ninja_hud {
    server 127.0.0.1:5000;
}

upstream ninja_beast {
    server 127.0.0.1:8888;
}

upstream ninja_landing {
    server 127.0.0.1:3000;
}

root /var/www/darkreconraptor;
index index.html;

# Main site — www + apex (static files)
server {
    listen 80;
    listen [::]:80;
    server_name darkreconraptor.com www.darkreconraptor.com;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /deploy/ {
        alias /var/www/darkreconraptor/deploy/;
        default_type text/plain;
    }

    # Optional: proxy root to app on 3000 instead of static
    # location / {
    #     proxy_pass http://ninja_landing;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}

# Signal Overlay — hud + operator
server {
    listen 80;
    listen [::]:80;
    server_name hud.darkreconraptor.com operator.darkreconraptor.com;

    # Uncomment and set YOUR_HOME_IP for operator-only access:
    # allow YOUR_HOME_IP;
    # deny all;

    location / {
        proxy_pass http://ninja_hud;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Edition OPERATOR;
    }

    # Fallback static HUD if app not running:
    error_page 502 503 504 = @static_hud;
    location @static_hud {
        root /var/www/darkreconraptor;
        try_files /hud/index.html =404;
    }
}

# ReconRaptor BEAST
server {
    listen 80;
    listen [::]:80;
    server_name beast.darkreconraptor.com;

    location / {
        proxy_pass http://ninja_beast;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Edition OPERATOR;
    }

    error_page 502 503 504 = @static_beast;
    location @static_beast {
        root /var/www/darkreconraptor;
        try_files /lab/index.html =404;
    }
}